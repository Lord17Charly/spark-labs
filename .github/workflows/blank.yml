name: spark
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  repository_dispatch:
    types: [spark]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "spark"
  spark:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Define permisos para el token de GitHub
    permissions:
      contents: write  # Permite escribir cambios en el repo

    steps:
      - uses: actions/checkout@v4

      - name: Listar archivos en el directorio
        run: ls -la  

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: vemonet/setup-spark@v1
        with:
          spark-version: '3.5.3'
          hadoop-version: '3'

      - name: Verificar versión de Spark
        run: spark-submit --version

      - name: Ejecutar script hello.py
        run: spark-submit --master local hello.py

      - name: Ver archivos después de ejecución
        run: ls -la 




